<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apa Nak Makan?</title>
  <style>
    body {
      font-family: system-ui, sans-serif; text-align: center;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      min-height: 100vh; margin: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 20px;
    }
    h1 { color: #ff0844; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
    button {
      background: #ff0844; color: white; font-size: 1.5rem; font-weight: bold;
      padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 8px 15px rgba(255, 8, 68, 0.4); transition: all 0.3s ease;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 20px rgba(255, 8, 68, 0.4); }
    button:active { transform: translateY(1px); }
    #result {
      margin-top: 40px; font-size: 3.5rem; color: #333; font-weight: 800;
      min-height: 80px; text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
    }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body>
  <h1>Apa nak makan tonight?</h1>
  <button onclick="pickDish()">Pilih untuk saya!</button>
  <div id="result"></div>
  <script>
    const dishes = [
      { name: 'Nasi Lemak', emoji: '🥥' }, { name: 'Roti Canai', emoji: '🫓' },
      { name: 'Laksa', emoji: '🍜' }, { name: 'Satay', emoji: '🍢' },
      { name: 'Mee Goreng', emoji: '🍝' }, { name: 'Cendol', emoji: '🍧' },
      { name: 'Rendang', emoji: '🍲' }, { name: 'Teh Tarik', emoji: '☕' },
      { name: 'Mee Rebus', emoji: '🍜' }, { name: 'Nasi Kerabu', emoji: '🍛' }
    ];
    function pickDish() {
      const result = document.getElementById('result');
      const dish = dishes[Math.floor(Math.random() * dishes.length)];
      result.classList.remove('animate');
      void result.offsetWidth; // trigger reflow
      result.textContent = `${dish.name} ${dish.emoji}`;
      result.classList.add('animate');
    }
  </script>
</body>
</html>
